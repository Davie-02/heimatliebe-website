# ── NETLIFY CONFIGURATION ────────────────────────────────────────
[build]
  publish = "."
  # No build command needed — content is loaded live via GitHub API

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/content/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"